<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Facts — Justin's Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Geneva&display=swap" rel="stylesheet">
<style>
  :root{
    --mac-gray:#8f8f8f;
    --ink:#111;
    --paper:#fdfdfd;
    --shadow:#000;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Geneva","Helvetica Neue",Helvetica,Arial,sans-serif;
    color:var(--ink);
    /* classic dithered-gray desktop */
    background-color:#909090;
    background-image:
      linear-gradient(45deg,#8a8a8a 25%,transparent 25%,transparent 75%,#8a8a8a 75%),
      linear-gradient(45deg,#8a8a8a 25%,#989898 25%,#989898 75%,#8a8a8a 75%);
    background-size:4px 4px;
    background-position:0 0,2px 2px;
    min-height:100vh;
    padding:26px 14px 60px;
    -webkit-font-smoothing:none;
  }
  /* menu bar */
  .menubar{
    position:fixed;top:0;left:0;right:0;height:22px;z-index:50;
    background:#fff;border-bottom:2px solid #000;
    display:flex;align-items:center;gap:18px;padding:0 12px;
    font-family:"Silkscreen",monospace;font-size:9px;letter-spacing:.5px;
  }
  .menubar .apple{font-size:12px;line-height:1;}
  .menubar .spacer{flex:1;}
  .rainbow{display:inline-block;}
  .rainbow b{display:inline-block;width:5px;height:11px;}
  .rainbow .g{background:#61bb46}.rainbow .y{background:#fdb827}.rainbow .o{background:#f5821f}
  .rainbow .r{background:#e03a3e}.rainbow .p{background:#963d97}.rainbow .b{background:#009ddc}

  .window{
    max-width:820px;margin:22px auto 0;background:var(--paper);
    border:2px solid #000;border-radius:8px 8px 4px 4px;
    box-shadow:3px 3px 0 rgba(0,0,0,.55);
    overflow:hidden;
  }
  .titlebar{
    position:relative;display:flex;align-items:center;justify-content:center;
    height:24px;border-bottom:2px solid #000;
    background:repeating-linear-gradient(#000,#000 1px,#fff 1px,#fff 3px);
  }
  .titlebar .title{
    background:var(--paper);padding:0 14px;font-family:"Silkscreen",monospace;
    font-size:11px;letter-spacing:1px;
  }
  .closebox{position:absolute;left:8px;top:5px;width:13px;height:13px;background:var(--paper);border:1.5px solid #000;}
  .zoombox{position:absolute;right:8px;top:5px;width:13px;height:13px;background:var(--paper);border:1.5px solid #000;}
  .zoombox::before{content:"";position:absolute;inset:1.5px;border:1.5px solid #000;height:5px;}

  .header{padding:22px 22px 14px;text-align:center;border-bottom:1px dashed #bbb;}
  .header h1{
    font-family:"Silkscreen",monospace;font-size:26px;margin:0 0 8px;line-height:1.15;
  }
  .header .apple-logo{margin-bottom:10px;}
  .header .apple-logo .rainbow b{width:8px;height:16px;}
  .header p{margin:6px 0 0;color:#444;font-size:13px;}
  .header .count{font-family:"Silkscreen",monospace;font-size:10px;color:#666;margin-top:12px;}

  .toolbar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:14px;background:#efefef;border-bottom:2px solid #000;}
  .btn{
    font-family:"Geneva",sans-serif;font-size:12px;font-weight:bold;
    background:#fff;border:1.5px solid #000;border-radius:11px;
    padding:5px 16px;cursor:pointer;box-shadow:1.5px 1.5px 0 #000;
  }
  .btn:active{transform:translate(1.5px,1.5px);box-shadow:none;}
  .search{
    font-family:"Geneva",sans-serif;font-size:12px;padding:5px 10px;
    border:1.5px solid #000;border-radius:0;background:#fff;min-width:180px;
  }

  .list{padding:16px;display:flex;flex-direction:column;gap:14px;}
  .fact{
    border:1.5px solid #000;background:#fff;border-radius:4px;
    box-shadow:2px 2px 0 rgba(0,0,0,.3);overflow:hidden;
  }
  .fact .cap{
    display:flex;align-items:center;gap:8px;
    background:repeating-linear-gradient(#000,#000 1px,#fff 1px,#fff 3px);
    border-bottom:1.5px solid #000;padding:3px 8px;
  }
  .fact .cap .name{background:#fff;padding:1px 8px;font-family:"Silkscreen",monospace;font-size:10px;letter-spacing:.5px;}
  .fact .cap .no{margin-left:auto;background:#fff;padding:1px 6px;font-family:"Silkscreen",monospace;font-size:9px;color:#777;}
  .fact .body{padding:12px 14px;font-size:14.5px;line-height:1.6;}
  .fact .body .tini{white-space:nowrap;}
  .empty{text-align:center;color:#666;padding:30px;font-size:13px;}

  footer{max-width:820px;margin:14px auto 0;text-align:center;color:#eee;font-size:11px;font-family:"Silkscreen",monospace;line-height:1.8;}
  footer .rainbow{vertical-align:middle;margin:0 4px;}
  a{color:inherit;}
  @media(max-width:520px){
    .header h1{font-size:19px;}
    .fact .body{font-size:13.5px;}
    .search{min-width:120px;}
  }
</style>
</head>
<body>
  <div class="menubar">
    <span class="apple"></span>
    <span>File</span><span>Edit</span><span>View</span><span>Special</span>
    <span class="spacer"></span>
    <span class="rainbow"><b class="g"></b><b class="y"></b><b class="o"></b><b class="r"></b><b class="p"></b><b class="b"></b></span>
  </div>

  <div class="window">
    <div class="titlebar">
      <span class="closebox"></span>
      <span class="title">Jazz Facts</span>
      <span class="zoombox"></span>
    </div>

    <div class="header">
      <div class="apple-logo"><span class="rainbow"><b class="g"></b><b class="y"></b><b class="o"></b><b class="r"></b><b class="p"></b><b class="b"></b></span></div>
      <h1>Jazz Facts</h1>
      <p>Every fact Claude served up, one martini at a time.</p>
      <div class="count" id="count"></div>
    </div>

    <div class="toolbar">
      <button class="btn" id="shuffle">🎲 Shuffle</button>
      <button class="btn" id="reset">Reset order</button>
      <input class="search" id="search" type="text" placeholder="Search facts…" aria-label="Search facts">
    </div>

    <div class="list" id="list"></div>
  </div>

  <footer>
    <div>MADE ON A CLASSIC MAC <span class="rainbow"><b class="g"></b><b class="y"></b><b class="o"></b><b class="r"></b><b class="p"></b><b class="b"></b></span> FOR JUSTIN</div>
    <div>SERVED WITH A MARTINI 🍸</div>
  </footer>

<script src="facts.js"></script>
<script>
  const listEl=document.getElementById('list');
  const countEl=document.getElementById('count');
  let order=FACTS.map((_,i)=>i);

  function render(items){
    listEl.innerHTML='';
    if(!items.length){listEl.innerHTML='<div class="empty">No facts match that search. 🍸</div>';return;}
    items.forEach((idx,pos)=>{
      const f=FACTS[idx];
      const card=document.createElement('div');
      card.className='fact';
      card.innerHTML=
        '<div class="cap"><span class="name"></span><span class="no">#'+String(idx+1).padStart(3,'0')+'</span></div>'+
        '<div class="body"></div>';
      card.querySelector('.name').textContent=f.t;
      card.querySelector('.body').textContent=f.f+' 🍸';
      listEl.appendChild(card);
    });
    countEl.textContent=items.length+' FACTS';
  }
  function currentFiltered(){
    const q=document.getElementById('search').value.trim().toLowerCase();
    let ids=order.slice();
    if(q) ids=ids.filter(i=>(FACTS[i].t+' '+FACTS[i].f).toLowerCase().includes(q));
    return ids;
  }
  document.getElementById('shuffle').onclick=()=>{
    for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
    render(currentFiltered());window.scrollTo({top:0,behavior:'smooth'});
  };
  document.getElementById('reset').onclick=()=>{order=FACTS.map((_,i)=>i);render(currentFiltered());};
  document.getElementById('search').oninput=()=>render(currentFiltered());
  render(currentFiltered());
</script>
</body>
</html>
